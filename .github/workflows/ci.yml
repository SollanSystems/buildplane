name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no dist directories before build
        run: |
          for d in apps/cli/dist packages/*/dist; do
            if [ -d "$d" ]; then
              echo "FAIL: $d exists before build" >&2
              exit 1
            fi
          done
          echo "OK: no dist directories found"

      - name: Dev smoke — init
        run: pnpm buildplane init

      - name: Dev smoke — run packet
        id: smoke-run
        run: |
          RUN_OUTPUT=$(pnpm buildplane run --packet test/fixtures/dev-bootstrap/packet.json 2>&1)
          echo "$RUN_OUTPUT"
          RUN_ID=$(echo "$RUN_OUTPUT" | grep '^run-id:' | awk '{print $2}')
          if [ -z "$RUN_ID" ]; then
            echo "FAIL: could not capture run id" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Dev smoke — status
        run: pnpm buildplane status --json

      - name: Dev smoke — inspect
        run: pnpm buildplane inspect "${{ steps.smoke-run.outputs.run_id }}" --json

      - name: Diag — check stderr from silent CLI commands
        run: |
          echo "--- init stderr ---"
          pnpm --silent buildplane init 2>/tmp/ci-stderr-init.txt; cat /tmp/ci-stderr-init.txt
          echo "--- status stderr ---"
          pnpm --silent buildplane status --json 2>/tmp/ci-stderr-status.txt >/dev/null; cat /tmp/ci-stderr-status.txt
          echo "--- done ---"

      - name: Assert clean worktree after smoke
        run: |
          BP=".buildplane"
          DIRTY=$(git status --porcelain --untracked-files=all -- . \
            ":(exclude)${BP}/state.db" \
            ":(exclude)${BP}/project.json" \
            ":(exclude)${BP}/artifacts/**" \
            ":(exclude)${BP}/evidence/**" \
            ":(exclude)${BP}/runs/**" \
            ":(exclude)${BP}/logs/**" \
            ":(exclude)${BP}/workspaces/**")
          if [ -n "$DIRTY" ]; then
            echo "FAIL: worktree is dirty after smoke:" >&2
            echo "$DIRTY" >&2
            exit 1
          fi
          echo "OK: worktree is clean (excluding Buildplane-managed state)"

      - name: Assert no dist directories created by smoke
        run: |
          for d in apps/cli/dist packages/*/dist; do
            if [ -d "$d" ]; then
              echo "FAIL: $d was created by smoke" >&2
              exit 1
            fi
          done
          echo "OK: no dist directories after smoke"

      - name: Clean Buildplane state before build
        run: |
          rm -rf .buildplane/project.json \
                 .buildplane/state.db \
                 .buildplane/artifacts \
                 .buildplane/evidence \
                 .buildplane/runs \
                 .buildplane/logs \
                 .buildplane/workspaces \
                 tmp

      - name: Verify published bootstrap
        id: verify-bootstrap
        run: |
          pnpm verify:published-bootstrap > /tmp/ci-verify-stdout.txt 2>/tmp/ci-verify-stderr.txt
          echo "verify_exit=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Diag — dump failure context
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Diagnostic Output\n\n';
            const files = [
              '/tmp/ci-stderr-init.txt',
              '/tmp/ci-stderr-status.txt',
              '/tmp/ci-verify-stdout.txt',
              '/tmp/ci-verify-stderr.txt'
            ];
            for (const f of files) {
              try {
                const content = fs.readFileSync(f, 'utf8').trim();
                body += `### ${f}\n\`\`\`\n${content || '(empty)'}\n\`\`\`\n\n`;
              } catch { body += `### ${f}\n(not found)\n\n`; }
            }
            body += `### verify-bootstrap outcome\n${context.steps?.['verify-bootstrap']?.outcome ?? 'unknown'}\n\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 15,
              body
            });

      - name: Fail if verify failed
        if: steps.verify-bootstrap.outcome == 'failure'
        run: exit 1

  verify-wrong-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node (wrong version for guard check)
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify wrong-Node guard
        run: BUILDPLANE_EXPECT_UNSUPPORTED_NODE=1 node ./scripts/published-bootstrap/verify-wrong-node.mjs
