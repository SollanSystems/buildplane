name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no dist directories before build
        run: |
          for d in apps/cli/dist packages/*/dist; do
            if [ -d "$d" ]; then
              echo "FAIL: $d exists before build" >&2
              exit 1
            fi
          done
          echo "OK: no dist directories found"

      - name: Dev smoke — init
        run: pnpm buildplane init

      - name: Dev smoke — run packet
        id: smoke-run
        run: |
          RUN_OUTPUT=$(pnpm buildplane run --packet test/fixtures/dev-bootstrap/packet.json 2>&1)
          echo "$RUN_OUTPUT"
          RUN_ID=$(echo "$RUN_OUTPUT" | grep '^run-id:' | awk '{print $2}')
          if [ -z "$RUN_ID" ]; then
            echo "FAIL: could not capture run id" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Dev smoke — status
        run: pnpm buildplane status --json

      - name: Dev smoke — inspect
        run: pnpm buildplane inspect "${{ steps.smoke-run.outputs.run_id }}" --json

      - name: Assert clean worktree after smoke
        run: |
          BP=".buildplane"
          DIRTY=$(git status --porcelain --untracked-files=all -- . \
            ":(exclude)${BP}/state.db" \
            ":(exclude)${BP}/project.json" \
            ":(exclude)${BP}/artifacts/**" \
            ":(exclude)${BP}/evidence/**" \
            ":(exclude)${BP}/runs/**" \
            ":(exclude)${BP}/logs/**" \
            ":(exclude)${BP}/workspaces/**")
          if [ -n "$DIRTY" ]; then
            echo "FAIL: worktree is dirty after smoke:" >&2
            echo "$DIRTY" >&2
            exit 1
          fi
          echo "OK: worktree is clean (excluding Buildplane-managed state)"

      - name: Assert no dist directories created by smoke
        run: |
          for d in apps/cli/dist packages/*/dist; do
            if [ -d "$d" ]; then
              echo "FAIL: $d was created by smoke" >&2
              exit 1
            fi
          done
          echo "OK: no dist directories after smoke"

      - name: Clean Buildplane state before build
        run: |
          rm -rf .buildplane/project.json \
                 .buildplane/state.db \
                 .buildplane/artifacts \
                 .buildplane/evidence \
                 .buildplane/runs \
                 .buildplane/logs \
                 .buildplane/workspaces \
                 tmp

      - name: Verify published bootstrap
        id: verify-bootstrap
        run: |
          pnpm verify:published-bootstrap > /tmp/ci-verify-stdout.txt 2>/tmp/ci-verify-stderr.txt
        continue-on-error: true

      - name: Diag — post failure context
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="## CI Diagnostic Output ($(git rev-parse --short HEAD))"$'\n\n'
          for f in /tmp/ci-verify-stdout.txt /tmp/ci-verify-stderr.txt; do
            BODY+="### $f"$'\n'
            if [ -f "$f" ]; then
              CONTENT=$(head -c 10000 "$f")
              BODY+='```'$'\n'"${CONTENT:-"(empty)"}"$'\n''```'$'\n\n'
            else
              BODY+="(not found)"$'\n\n'
            fi
          done
          BODY+="### verify-bootstrap outcome: ${{ steps.verify-bootstrap.outcome }}"$'\n'
          gh pr comment 15 --repo "${{ github.repository }}" --body "$BODY"

      - name: Fail if verify failed
        if: steps.verify-bootstrap.outcome == 'failure'
        run: exit 1

  verify-wrong-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node (wrong version for guard check)
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify wrong-Node guard
        id: verify-wrong-node
        run: |
          BUILDPLANE_EXPECT_UNSUPPORTED_NODE=1 node ./scripts/published-bootstrap/verify-wrong-node.mjs > /tmp/ci-wrong-node-stdout.txt 2>/tmp/ci-wrong-node-stderr.txt
        continue-on-error: true

      - name: Diag — post wrong-node failure context
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="## CI Wrong-Node Diagnostic ($(git rev-parse --short HEAD))"$'\n\n'
          for f in /tmp/ci-wrong-node-stdout.txt /tmp/ci-wrong-node-stderr.txt; do
            BODY+="### $f"$'\n'
            if [ -f "$f" ]; then
              CONTENT=$(head -c 10000 "$f")
              BODY+='```'$'\n'"${CONTENT:-"(empty)"}"$'\n''```'$'\n\n'
            else
              BODY+="(not found)"$'\n\n'
            fi
          done
          BODY+="### verify-wrong-node outcome: ${{ steps.verify-wrong-node.outcome }}"$'\n'
          gh pr comment 15 --repo "${{ github.repository }}" --body "$BODY"

      - name: Fail if verify-wrong-node failed
        if: steps.verify-wrong-node.outcome == 'failure'
        run: exit 1
