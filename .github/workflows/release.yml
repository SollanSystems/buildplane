name: Create Release PR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Persist a non-default token so the release-PR push is NOT authed by
          # GITHUB_TOKEN. Pushes made with GITHUB_TOKEN don't trigger pull_request/
          # push workflows, which left every changeset release PR permanently
          # missing its required checks (verify, Analyze) and stuck BLOCKED.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require npm credentials on a release-landing push
        # When the "chore: version packages" release PR merges, this push is the
        # one that publishes. Fail loud (not silently) if NPM_TOKEN was never
        # configured, so a merged release can't quietly skip the npm publish.
        if: "${{ startsWith(github.event.head_commit.message, 'chore: version packages') }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN is not configured; refusing to publish to npm without registry credentials."
            exit 1
          fi

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # With pending changesets this opens/updates the "chore: version
          # packages" PR (no publish, no NPM_TOKEN needed). Once that PR merges
          # the changesets are consumed, so this run instead publishes the bumped
          # package.
          #
          # `release:publish` publishes the vendored, self-contained staged
          # artifact from stage-package.mjs — NOT apps/cli/package.json AS-IS,
          # whose `workspace:*` deps on unpublished @buildplane/* packages would
          # ship an uninstallable tarball (O6). It prints the changesets `New
          # tag:` line so the action still creates the git tag + GitHub release.
          version: pnpm exec changeset version
          publish: pnpm release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
