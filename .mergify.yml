# Managed Mergify policy: label-gated auto-queue for reviewed green PRs.
# The opt-in label intentionally stays aligned with Buildplane's local
# auto-merge eligibility/opt-in tooling.
merge_protections_settings:
  auto_merge_conditions:
    - label = buildplane:auto-merge
    - base = main
  reporting_method: check-runs

merge_protections:
  # Always-on gate for ALL merges to main: required CI green + no conflict/draft.
  # Review is intentionally NOT required here so a solo operator can land a
  # reviewed PR (GitHub forbids self-approval, which made every solo PR
  # permanently BLOCKED). The `#approved-reviews-by >= 1` requirement is
  # enforced only on the label-gated auto-merge queue below, so unattended
  # auto-merge still demands a review.
  - name: require green CI on main
    if:
      - base = main
    success_conditions:
      - check-success = verify
      - check-success = Analyze (javascript-typescript)
      - check-success = GitGuardian Security Checks
      - -conflict
      - -draft

merge_queue:
  mode: serial
  max_parallel_checks: 1
  status_comments: outcomes
  queued_label: queued
  dequeued_label: dequeued

queue_rules:
  - name: hotfix
    queue_conditions:
      - base = main
      - label = buildplane:auto-merge
      - label = hotfix
    merge_conditions: &reviewed_green_conditions
      - "#approved-reviews-by >= 1"
      - check-success = verify
      - check-success = Analyze (javascript-typescript)
      - check-success = GitGuardian Security Checks
      - -conflict
      - -draft
      - "#changes-requested-reviews-by = 0"
    merge_method: squash
    batch_size: 1
  - name: default
    queue_conditions:
      - base = main
      - label = buildplane:auto-merge
    merge_conditions: *reviewed_green_conditions
    merge_method: squash
    batch_size: 1

priority_rules:
  - name: hotfix priority
    conditions:
      - label = hotfix
    priority: high
    allow_checks_interruption: false
